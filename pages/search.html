---
layout: page
title: 搜索
show: false
sitemap: false
---

<div class="page page-search">
  <header class="search-header">
    <h1 class="search-title"><i class="fas fa-search"></i> 站内搜索</h1>
    <p class="search-meta">基于 Pagefind 静态索引，纯前端运行，无网络跳转</p>
  </header>

  <link rel="stylesheet" href="/pagefind/pagefind-ui.css">
  <div id="search"></div>
  <script src="/pagefind/pagefind-ui.js"></script>
  <script>
    (function () {
      function init() {
        if (typeof PagefindUI === 'undefined') return setTimeout(init, 100);
        var ui = new PagefindUI({
          element: '#search',
          showImages: false,
          showSubResults: true,
          resetStyles: false,
          translations: {
            placeholder: '搜索全文…',
            clear_search: '清空',
            load_more: '加载更多',
            search_label: '站内搜索',
            filters_label: '筛选',
            zero_results: '没有找到匹配 "[SEARCH_TERM]" 的内容',
            many_results: '找到 [COUNT] 条匹配 "[SEARCH_TERM]" 的结果',
            one_result: '找到 1 条匹配 "[SEARCH_TERM]" 的结果',
            alt_search: '没有匹配，建议搜索 [DIFFERENT_TERM]',
            search_suggestion: '试试搜索 [DIFFERENT_TERM]',
            searching: '搜索中…'
          }
        });
        var q = new URLSearchParams(location.search).get('q');
        if (q) {
          var input = document.querySelector('#search input.pagefind-ui__search-input');
          if (input) {
            input.value = q;
            input.dispatchEvent(new Event('input', { bubbles: true }));
          }
        }
      }
      init();
    })();
  </script>
</div>
