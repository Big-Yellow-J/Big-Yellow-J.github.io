encoding: utf-8
plugins:
  - jekyll-regex-replace
  - jekyll-last-modified-at
  - jekyll-paginate
  - jekyll-minifier
  - jekyll-feed
#   - jekyll-assets

# 增量构建：serve --watch 大幅提速；如分页/集合出现异常，临时注释掉
incremental: true
keep_files:
  - pagefind

# assets:
#   compress:
#     css: true
#     js: true
#   cachebust: hard 

jekyll-minifier:
  remove_comments: true
  remove_intertag_spaces: true
  compress_css: true
  compress_javascript: false   # uglifier 4.2.1 不识别 ES2020+ 语法（?. ?? async）；jekyll-minifier 0.1.10 也不支持 uglifier_args.harmony；统一关掉 inline JS 压缩
  compress_json: true
  preserve_php: false

paginate: 15
paginate_path: "/page:num/"

last_modified_at:
  enabled: true
  date_format: "%Y-%m-%d %H:%M:%S"

# SEO相关信息
title: Big-Yellow-J
description: 个人技术博客系统记录各类算法原理、实现细节与代码实战，便于总结与复盘技术成长过程
keywords: Blog,DeepLearning,MachineLearning,AI,Python,Paper
author: HuangJie
author_info:
  github: shangxiaaabb
  bitbucket: #
  zhihu: zhi-hui-ha-ha-xiao-de-sha-zi
  email: hjie20011001@gmai.com
  location: 武汉
  stackoverflow: 
api_info:
  tianditu: 5ff361b4ae2c6f51000feb3e58023a8e
  seniverse: SOOcdTxiop033YKPB

# 这些不要动
highlighter: prism
permalink: /posts/:year/:month/:day/:title.html
kramdown:
  math_engine: mathjax
  hard_wrap: true
  auto_ids: true
  input: GFM
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    disable: true
  parse_block_html: true
include:
  - _jupyter
  - index_now.txt
  - life.html
exclude:
  - CNAME
  - README.md
  - LICENSE
  - CLAUDE.md
  - _site
  - code
  - dist
  - Gemfile
  - Gemfile.lock
  - blog.sh
  - submit_github.sh
  - optim_post.py
  - submit_url.py
  - DEAL-MD.json
  - API_KEY.env
  - google_api.json
  - vendor
  - node_modules
  - scripts
  - .bundle
  - .jekyll-cache
  - .idea
  - .vscode
  - .claude
  - .obsidian
  - .junie
  # writing 只编译 *.md 草稿（供 /pages/writing.html 索引预览），代码/数据/图片目录全部排除
  - writing/__pycache__
  - writing/image
  - writing/learning_agent
  - writing/DistributeTraining
  - writing/DataDistributeResult
  - writing/DataDistributeResult-1
  - writing/*.py
  - writing/*.ipynb
  - _framework

# 域名配置
# url: 站点完整域名，absolute_url 过滤器依赖它生成带域名的绝对地址
#      （canonical / og:url / JSON-LD / 复制导出的原文链接都靠它，缺失会退化成相对路径）
# baseurl配置,如果网站部署在根目录下的其他目录中，请设置为 /目录名
url: 'https://www.big-yellow-j.top'
domainUrl: 'https://www.big-yellow-j.top'
baseurl: ''

# 吐个槽地址，会在chat页面中重定向到该地址
tucaoUrl: https://support.qq.com/product/86335

# emoji 单独成字段：窄屏由 CSS 隐藏，避免菜单换行
menu:
  - title: 首页
    emoji: 🎆
    url: /
  - title: 归类
    emoji: 🗂️
    url: /pages/categories.html
  - title: 标签
    emoji: 🏷️
    url: /pages/tags.html
  - title: 归档
    emoji: 🗓️
    url: /pages/archives.html
  - title: 生活
    emoji: 🦄
    url: /pages/life.html
  - title: 搜索
    emoji: 🔍
    url: /pages/search.html
#  - title: 📃CV
#    url: /pages/cv.html
#  - title: 👋关于
#    url: /pages/about.html
  # - title: Writing
  #   url: /pages/writing.html

# 点击页面文字冒出特效,不需要请设置为false
extClickEffect: false

# Google Adsense,不需要请设置为false
# _includes/ext-adsense.html 里面修改为自己的配置
extAdsense: false

# 数学公式支持（KaTeX 0.16，仅文章页生效）
# 全站默认关，含公式的文章在 frontmatter 中声明 extMath: true 单独加载
extMath: false

# Mermaid 流程图支持（mermaid@11，仅文章页生效）
# 全站默认关，含 ```mermaid 代码块的文章在 frontmatter 中声明 mermaid: true 单独加载
extMermaid: false

# 生活栏目 (/pages/life.html) 时间线显示方式
# 可选值：magazine（杂志网格，默认）/ curve（曲线错落）/ axis（中轴交替）
life_view: magazine

# 私密相册地址（树莓派 tailnet 内 .ts.net，仅受邀者可达）；留空则不显示私密入口
life_private_url: "https://huangjie.tail036295.ts.net/"

# 列表卡片缩略图代理（首屏图体积大才需要开；置空 = 用原图）
# 注意：开启后 PhotoSwipe 仍打开原图（src/href 双源），但弹窗显示前会先读缩略图尺寸做容器
# 推荐：原图 < 200KB 时保持空；原图很大时填 https://wsrv.nl/
life_thumb_proxy: ""

# Service Worker：二次访问全站缓存，离线可访问
extServiceWorker: true

# 显示访问量统计，由不蒜子提供服务
extCount: true

# 友情链接
links:
