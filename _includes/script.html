{%- assign buildVer = site.time | date: "%Y%m%d" -%}
<script type="text/javascript" src="{{site.baseurl}}/static/js/blog.js?v={{ buildVer }}"></script>

{%- if site.extClickEffect %}
<script>
;(function(){
  var textArr = ['富强', '民主', '文明', '和谐', '自由', '平等', '公正', '法治', '爱国', '敬业', '诚信', '友善']
  window.blog.initClickEffect(textArr)
})()
</script>
{%- endif %}

{%- if page.layout == "mypost" %}
  {%- if site.extMath or page.extMath %}
    {% include ext-mathjax.html %}
  {%- endif %}
{%- endif %}
