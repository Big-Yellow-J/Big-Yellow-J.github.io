# Ray 推理服务单机编排
# 用法:cp .env.example .env && docker compose up -d
# 首次启动会自动 prepare 权重(~6GB,数分钟)
services:
  ray-inference:
    build:
      context: .
      dockerfile: Dockerfile
    image: ray-inference:v1.0
    container_name: ray-inference
    restart: unless-stopped

    # Ray plasma object store 用共享内存,默认 64MB 不够
    shm_size: "4gb"

    # 给 _shutdown 留 grace period;ray_deploy.SHUTDOWN_GRACE_SEC=30,这里宽松一点
    stop_grace_period: 45s

    env_file:
      - .env

    ports:
      - "7890:7890"
      # Ray dashboard:默认不暴露;需访问取消注释,绑回环走 SSH 隧道
      # - "127.0.0.1:8265:8265"

    # 三大持久化目录:weights(6GB+)、data(Milvus + 备份)、tmp(日志)
    volumes:
      - ./weights:/app/weights
      - ./data:/app/data
      - ./tmp:/app/tmp

    # GPU 配额:默认占用 GPU 0,改 device_ids 选其他卡
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["0"]
              capabilities: [gpu]

    # 探针:容器内 curl /readyz,启动 120s 内允许失败(权重加载慢)
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:7890/readyz || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 120s
