name: Build & Deploy Jekyll to GitHub Pages

on:
  push:
    branches: ["master"]
    paths-ignore:
      - 'CLAUDE.md'
      - 'README.md'
      - 'LICENSE'
      - '.gitignore'
      - '.gitattributes'
      - 'blog.sh'
      - 'submit_github.sh'
      - 'optim_post.py'
      - 'DEAL-MD.json'
      - '.idea/**'
      - '.obsidian/**'
      - '.junie/**'
      - '.claude/**'
      - 'scripts/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # ----- 1. 内容质量门：front matter 校验，失败即停 -----
  lint:
    name: Lint front matter
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install deps
        run: pip install pyyaml
      - name: Validate _posts front matter
        run: python3 scripts/validate_front_matter.py

  # ----- 2. 构建 Jekyll 站点 -----
  build:
    name: Build site
    needs: lint
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # jekyll-last-modified-at 需要历史

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true

      - name: Cache Jekyll incremental output
        uses: actions/cache@v5
        with:
          path: .jekyll-cache
          key: jekyll-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            jekyll-${{ runner.os }}-

      - name: Build with Jekyll
        env:
          JEKYLL_ENV: production
        run: bundle exec jekyll build --trace

      # jekyll-minifier 的 uglifier 不支持 ES2020+，自有 JS 在产物里用 terser 压缩
      - name: Minify JS with terser
        run: |
          npm i -g terser@5
          find _site/static/js -name '*.js' -print0 | while IFS= read -r -d '' f; do
            terser "$f" --compress --mangle -o "$f" || echo "skip $f"
          done

      - name: Generate Pagefind search index
        run: npx -y pagefind --site _site --output-path _site/pagefind

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3

  # ----- 3. 部署到 GitHub Pages -----
  deploy:
    name: Deploy to Pages
    needs: build
    runs-on: ubuntu-24.04
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # ----- 4. 部署后推搜索引擎（仅 secrets 齐全时跑） -----
  notify:
    name: Notify search engines
    needs: deploy
    runs-on: ubuntu-24.04
    if: ${{ github.event_name == 'push' || github.event_name == 'workflow_dispatch' }}
    steps:
      - name: Skip when secrets missing
        id: gate
        env:
          GOOGLE_SA_JSON: ${{ secrets.GOOGLE_SA_JSON }}
        run: |
          if [ -z "$GOOGLE_SA_JSON" ]; then
            echo "GOOGLE_SA_JSON secret not set, skipping search-engine ping."
            echo "skip=1" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/checkout@v4
        if: steps.gate.outputs.skip != '1'
      - uses: actions/setup-python@v5
        if: steps.gate.outputs.skip != '1'
        with:
          python-version: '3.11'
      - name: Install deps
        if: steps.gate.outputs.skip != '1'
        run: pip install google-auth google-api-python-client requests
      - name: Submit URLs
        if: steps.gate.outputs.skip != '1'
        env:
          GOOGLE_SA_JSON: ${{ secrets.GOOGLE_SA_JSON }}
          BING_INDEXNOW_KEY: ${{ secrets.BING_INDEXNOW_KEY }}
          BAIDU_PUSH_TOKEN: ${{ secrets.BAIDU_PUSH_TOKEN }}
        run: python3 submit_url.py
